<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCM ERP</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  /* ── Reset & zmienne ────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --rcm-blue:    #0f2340;
    --rcm-blue-2:  #1e3f6f;
    --rcm-accent:  #e07b0f;
    --rcm-green:   #16a34a;
    --rcm-red:     #dc2626;
    --rcm-warn:    #d97706;
    --bg:          #f0f3f9;
    --card:        #ffffff;
    --border:      #e4e9f0;
    --text:        #0f1923;
    --muted:       #64748b;
    --radius:      10px;
    --sh-sm:  0 1px 3px rgba(0,0,0,0.07), 0 0 0 1px rgba(0,0,0,0.03);
    --sh-md:  0 4px 16px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.03);
    --sh-lg:  0 12px 40px rgba(0,0,0,0.16), 0 0 0 1px rgba(0,0,0,0.04);
  }
  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg); color: var(--text);
    -webkit-font-smoothing: antialiased;
    line-height: 1.55;
  }

  /* ── Login ───────────────────────────────────────────────────── */
  .login-bg {
    min-height: 100vh;
    background: linear-gradient(150deg, #0a1628 0%, #0f2340 45%, #1b3a68 100%);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .login-card {
    background: #fff; border-radius: 16px;
    box-shadow: 0 32px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.05);
    width: 100%; max-width: 380px; padding: 44px 40px;
  }
  .login-logo { display: flex; align-items: center; gap: 14px; margin-bottom: 36px; }
  .login-logo-mark {
    width: 46px; height: 46px; border-radius: 12px;
    background: var(--rcm-blue); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.5rem;
    flex-shrink: 0;
  }
  .login-brand {
    font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1.25rem;
    color: var(--text); line-height: 1.1;
  }
  .login-sub { font-size: 0.76rem; color: var(--muted); margin-top: 2px; }
  .login-divider {
    border: none; border-top: 1px solid var(--border); margin: 24px 0;
  }

  /* ── Layout ─────────────────────────────────────────────────── */
  header {
    background: var(--rcm-blue); color: #fff;
    padding: 0 28px; height: 54px;
    display: flex; align-items: center; gap: 14px;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
  }
  .header-logo-mark {
    width: 30px; height: 30px; border-radius: 7px;
    background: var(--rcm-accent);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Outfit', sans-serif; font-weight: 900; font-size: 1rem;
    flex-shrink: 0; color: #fff;
  }
  header h1 {
    font-family: 'Outfit', sans-serif; font-weight: 800;
    font-size: 1.05rem; letter-spacing: -0.01em;
  }
  header .role-badge {
    margin-left: auto;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.18);
    padding: 4px 14px; border-radius: 20px;
    font-size: 0.8rem; font-weight: 600;
  }

  nav {
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 0 20px; display: flex; gap: 2px; overflow-x: auto;
    position: sticky; top: 54px; z-index: 99;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
  }
  nav button {
    padding: 0 16px; height: 46px; border: none; background: transparent;
    cursor: pointer; font-size: 0.875rem; font-family: inherit; font-weight: 500;
    color: var(--muted); border-bottom: 2.5px solid transparent;
    transition: all 0.15s ease; white-space: nowrap; display: flex; align-items: center; gap: 6px;
  }
  nav button.active {
    color: var(--rcm-blue); border-bottom-color: var(--rcm-accent); font-weight: 700;
  }
  nav button:hover:not(.active) { color: var(--text); background: var(--bg); }

  main { max-width: 980px; margin: 28px auto; padding: 0 20px; }

  /* ── Karty ──────────────────────────────────────────────────── */
  .card {
    background: var(--card); border-radius: var(--radius);
    box-shadow: var(--sh-sm); padding: 24px; margin-bottom: 18px;
  }
  .card h2 {
    font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 0.9rem;
    margin-bottom: 20px; color: var(--rcm-blue);
    text-transform: uppercase; letter-spacing: 0.08em;
    display: flex; align-items: center; gap: 8px;
  }
  .card h2::before {
    content: ''; display: block; width: 3px; height: 14px;
    background: var(--rcm-accent); border-radius: 2px; flex-shrink: 0;
  }

  /* ── Formularze ─────────────────────────────────────────────── */
  .form-row { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; }
  label {
    font-size: 0.74rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.06em;
  }
  input, select, textarea {
    border: 1.5px solid var(--border); border-radius: 7px;
    padding: 9px 12px; font-size: 0.9rem; font-family: inherit;
    background: #fff; color: var(--text);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none; border-color: var(--rcm-blue-2);
    box-shadow: 0 0 0 3px rgba(30,63,111,0.1);
  }
  textarea { resize: vertical; min-height: 80px; }

  /* ── Przyciski ──────────────────────────────────────────────── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: 8px; border: none;
    font-size: 0.875rem; font-weight: 600; font-family: inherit;
    cursor: pointer; transition: all 0.15s ease; white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .btn:hover:not(:disabled) { transform: translateY(-1px); }
  .btn:active:not(:disabled) { transform: translateY(0px); }
  .btn:disabled { opacity: 0.38; cursor: not-allowed; }
  .btn-primary { background: var(--rcm-blue); color: #fff; }
  .btn-primary:hover:not(:disabled) { background: var(--rcm-blue-2); box-shadow: 0 4px 14px rgba(15,35,64,0.4); }
  .btn-accent  { background: var(--rcm-accent); color: #fff; }
  .btn-accent:hover:not(:disabled)  { box-shadow: 0 4px 14px rgba(224,123,15,0.4); }
  .btn-danger  { background: var(--rcm-red); color: #fff; }
  .btn-danger:hover:not(:disabled)  { box-shadow: 0 4px 12px rgba(220,38,38,0.35); }
  .btn-success { background: var(--rcm-green); color: #fff; }
  .btn-success:hover:not(:disabled) { box-shadow: 0 4px 12px rgba(22,163,74,0.35); }
  .btn-outline {
    background: transparent; color: var(--rcm-blue);
    border: 1.5px solid var(--border);
  }
  .btn-outline:hover:not(:disabled) { border-color: var(--rcm-blue); background: #f4f7fb; }
  .btn-sm { padding: 5px 12px; font-size: 0.8rem; border-radius: 6px; }

  /* ── Triage Boxes ───────────────────────────────────────────── */
  .triage-result {
    padding: 16px 20px; border-radius: var(--radius);
    font-weight: 600; font-size: 0.95rem; margin-top: 14px;
    display: flex; align-items: center; gap: 12px;
  }
  .triage-odrzut      { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }
  .triage-standard    { background: #f0fdf4; color: #166534; border: 1px solid #86efac; }
  .triage-niestandard { background: #fffbeb; color: #92400e; border: 1px solid #fcd34d; }

  /* ── Tabela ─────────────────────────────────────────────────── */
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  tr:hover td { background: #fafbfc; }

  /* ── Status badge ───────────────────────────────────────────── */
  .badge {
    display: inline-block; padding: 3px 9px; border-radius: 99px;
    font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em;
  }
  .badge-draft         { background: #e0e0e0; color: #555; }
  .badge-standard      { background: #e8f5e9; color: var(--rcm-green); }
  .badge-niestandard   { background: #fff3e0; color: var(--rcm-warn); }
  .badge-quoted        { background: #e3f2fd; color: #0d47a1; border: 1px solid #1565c0; }
  .badge-rejected      { background: #ffebee; color: var(--rcm-red); }
  .badge-in_production { background: #e8eaf6; color: #283593; }
  .badge-w_trakcie     { background: #e8f5e9; color: #1b5e20; border: 1px solid #388e3c; }
  .badge-gotowe        { background: #e0f7fa; color: #006064; border: 1px solid #0097a7; }
  .badge-wydane        { background: #f3e5f5; color: #6a1b9a; }
  .badge-done          { background: #ede7f6; color: #4527a0; }
  .badge-cancelled     { background: #e0e0e0; color: #999; text-decoration: line-through; }

  /* ── Wizard steps ───────────────────────────────────────────── */
  .steps { display: flex; margin-bottom: 24px; border-radius: 8px; overflow: hidden; border: 1px solid var(--border); }
  .step {
    flex: 1; padding: 11px 8px; text-align: center;
    font-size: 0.78rem; font-weight: 600; color: var(--muted);
    background: #f8f9fb; border-right: 1px solid var(--border);
    transition: all 0.15s ease;
  }
  .step:last-child { border-right: none; }
  .step.active { background: var(--rcm-blue); color: #fff; }
  .step.done   { background: #f0fdf4; color: var(--rcm-green); }

  /* ── Sticky header ──────────────────────────────────────────── */
  header { position: sticky; top: 0; z-index: 100; }

  /* ── Table polish ───────────────────────────────────────────── */
  th { padding: 10px 12px; text-align: left; background: var(--rcm-blue); color: #fff;
       font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.04em; }

  /* ── Field hint ─────────────────────────────────────────────── */
  .field-hint { font-size: 0.75rem; color: var(--muted); margin-top: 3px; font-style: italic; }

  /* ── Mini dashboard (Biuro/Technolog) ──────────────────────── */
  .mini-dash { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; }
  .mini-stat {
    flex: 1; min-width: 120px; background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 10px 14px; border-left: 4px solid var(--rcm-blue);
  }
  .mini-stat.warn  { border-left-color: var(--rcm-warn); }
  .mini-stat.green { border-left-color: var(--rcm-green); }
  .mini-stat.red   { border-left-color: var(--rcm-red); }
  .mini-stat .n  { font-size: 1.6rem; font-weight: 800; color: var(--rcm-blue); }
  .mini-stat.warn  .n { color: var(--rcm-warn); }
  .mini-stat.green .n { color: var(--rcm-green); }
  .mini-stat.red   .n { color: var(--rcm-red); }
  .mini-stat .t  { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  /* ── Analytics cards ────────────────────────────────────────── */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px; text-align: center;
    border-top: 3px solid var(--rcm-blue);
  }
  .stat-card.accent-green  { border-top-color: var(--rcm-green); }
  .stat-card.accent-red    { border-top-color: var(--rcm-red); }
  .stat-card.accent-warn   { border-top-color: var(--rcm-warn); }
  .stat-card.accent-purple { border-top-color: #6a1b9a; }
  .stat-card .num { font-size: 2rem; font-weight: 800; color: var(--rcm-blue); }
  .stat-card .lbl { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

  /* ── Param badge ─────────────────────────────────────────────── */
  .param-badge {
    display: inline-flex; gap: 4px; align-items: center;
    background: #fffbeb; color: #92400e;
    border: 1px solid #fde68a; border-radius: 99px;
    padding: 3px 10px; font-size: 0.73rem; font-weight: 600;
  }

  /* ── SOP Builder ─────────────────────────────────────────────── */
  .sop-blocks { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
  .sop-block {
    padding: 5px 13px; background: #f0f5ff; border: 1px solid #c7d2fe;
    border-radius: 99px; cursor: pointer; font-size: 0.82rem;
    color: var(--rcm-blue-2); font-weight: 600;
    transition: all 0.15s;
  }
  .sop-block:hover { background: var(--rcm-blue); color: #fff; border-color: var(--rcm-blue); }
  .sop-selected { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
  .sop-item {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; background: var(--bg); border-radius: 8px; font-size: 0.85rem;
  }
  .sop-item .drag-handle { cursor: grab; color: var(--muted); }
  .sop-num { font-weight: 700; color: var(--rcm-blue); min-width: 20px; }

  /* ── Kompas cenowy (PLN/kg tool) ────────────────────────────── */
  .kompas-box {
    background: linear-gradient(135deg, #0f2340 0%, #1e3f6f 100%);
    border-radius: var(--radius); padding: 16px 20px; margin-bottom: 18px;
    color: #fff;
  }
  .kompas-box label { color: rgba(255,255,255,0.7); }
  .kompas-box input {
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    color: #fff; border-radius: 6px;
  }
  .kompas-box input::placeholder { color: rgba(255,255,255,0.4); }
  .kompas-box input:focus {
    border-color: var(--rcm-accent);
    box-shadow: 0 0 0 3px rgba(224,123,15,0.25);
    background: rgba(255,255,255,0.18);
  }
  .kompas-result {
    font-family: 'DM Mono', monospace; font-size: 1.6rem; font-weight: 500;
    color: var(--rcm-accent); line-height: 1;
  }
  .kompas-diff { font-size: 0.8rem; font-weight: 600; margin-top: 3px; }
  .kompas-diff.ok     { color: #86efac; }
  .kompas-diff.warn   { color: #fde68a; }
  .kompas-diff.over   { color: #fca5a5; }

  /* ── Breakdown panel ─────────────────────────────────────────── */
  .breakdown-panel {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; margin: 14px 0;
    font-size: 0.875rem;
  }
  .breakdown-row {
    display: flex; justify-content: space-between;
    padding: 4px 0; color: var(--muted);
  }
  .breakdown-row.total {
    border-top: 1px solid var(--border); margin-top: 8px; padding-top: 10px;
    font-weight: 700; font-size: 1rem; color: var(--text);
  }
  .breakdown-row.total span:last-child { color: var(--rcm-blue); }
  .breakdown-row.pln-kg {
    border-top: 1px dashed var(--border); margin-top: 6px; padding-top: 8px;
    font-size: 0.8rem;
  }

  /* ── Card-table edge-to-edge ────────────────────────────────── */
  /* Tables inside cards stretch to edges for a modern SaaS look */
  .card > table, .card > div > table {
    margin: 0 -24px -24px; width: calc(100% + 48px);
    border-radius: 0 0 var(--radius) var(--radius);
    overflow: hidden;
  }
  .card > h2 + table, .card > h2 ~ div > table,
  .card > h2 + div > table {
    margin-top: 0;
  }

  /* ── Section separator ───────────────────────────────────────── */
  .section-sep {
    border: none; border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  /* ── Scrollbar polish ────────────────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #c1c9d6; border-radius: 99px; }
  ::-webkit-scrollbar-thumb:hover { background: #9aaaba; }
</style>
</head>
<body>
<div id="app">

  <!-- ═══ LOGIN ════════════════════════════════════════════════════════════ -->
  <div v-if="!currentUser" class="login-bg">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-mark">R</div>
        <div>
          <div class="login-brand">RCM ERP</div>
          <div class="login-sub">System zarządzania zleceniami</div>
        </div>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label>Rola</label>
        <select v-model="loginRole">
          <option value="biuro">Biuro</option>
          <option value="technolog">Technolog</option>
          <option value="dyrektor">Dyrektor</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label>PIN</label>
        <input type="password" v-model="loginPin" placeholder="••••" @keyup.enter="login" maxlength="4"
               style="font-size:1.4rem;letter-spacing:0.3em;text-align:center">
      </div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" @click="login">
        Zaloguj się
      </button>
      <p v-if="loginError" style="color:var(--rcm-red);text-align:center;margin-top:10px;font-size:0.85rem;font-weight:600">
        Błędny PIN — spróbuj ponownie
      </p>
      <hr class="login-divider">
      <p style="text-align:center;font-size:0.72rem;color:var(--muted);line-height:1.8">
        Biuro <strong>1111</strong> · Technolog <strong>2222</strong> · Dyrektor <strong>3333</strong>
      </p>
    </div>
  </div>

  <!-- ═══ GŁÓWNY INTERFEJS ══════════════════════════════════════════════════ -->
  <template v-else>
    <header>
      <div class="header-logo-mark">R</div>
      <h1>RCM ERP</h1>
      <div class="role-badge">{{ currentUser.name }}</div>
      <button class="btn btn-sm" style="margin-left:8px;background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.18)" @click="logout">Wyloguj</button>
    </header>

    <nav>
      <!-- Biuro widzi: Nowe zlecenie, Lista zleceń, Pytania od Technologa -->
      <template v-if="currentUser.role === 'biuro'">
        <button :class="{active: tab==='wizard'}"  @click="tab='wizard';resetWizard()">+ Nowe zlecenie</button>
        <button :class="{active: tab==='orders'}"  @click="tab='orders';loadOrders()">Lista zleceń</button>
        <button :class="{active: tab==='pytania'}" @click="tab='pytania';loadPytania()"
                style="display:flex;align-items:center;gap:6px">
          Pytania od Technologa
          <span v-if="pendingCount > 0"
                style="background:var(--rcm-red);color:#fff;border-radius:10px;padding:1px 7px;font-size:0.75rem;font-weight:700">
            {{ pendingCount }}
          </span>
        </button>
      </template>
      <!-- Technolog widzi: Kolejka, Katalog SOP -->
      <template v-if="currentUser.role === 'technolog'">
        <button :class="{active: tab==='queue'}"      @click="tab='queue';loadOrders()">Kolejka</button>
        <button :class="{active: tab==='templates'}"  @click="tab='templates';loadTemplates()">Katalog SOP</button>
        <button :class="{active: tab==='orders'}"     @click="tab='orders';loadOrders()">Wszystkie zlecenia</button>
      </template>
      <!-- Dyrektor widzi: Dashboard, Harmonogram, Benchmark -->
      <template v-if="currentUser.role === 'dyrektor'">
        <button :class="{active: tab==='analytics'}"  @click="tab='analytics';loadAnalytics()">Dashboard</button>
        <button :class="{active: tab==='harmonogram'}"@click="tab='harmonogram';loadHarmonogram()">Harmonogram</button>
        <button :class="{active: tab==='benchmark'}"  @click="tab='benchmark';loadBenchmark()">📊 Benchmark cen</button>
        <button :class="{active: tab==='orders'}"     @click="tab='orders';loadOrders()">Wszystkie zlecenia</button>
      </template>
    </nav>

    <main>

      <!-- ── WIZARD (Biuro — Nowe zlecenie) ──────────────────────────── -->
      <div v-if="tab==='wizard'">
        <div class="card">
          <div class="steps">
            <div class="step" :class="{active: wStep===1, done: wStep>1}">1. Co robimy?</div>
            <div class="step" :class="{active: wStep===2, done: wStep>2}">2. Szczegóły</div>
            <div class="step" :class="{active: wStep===3}">3. Triage</div>
          </div>

          <!-- STEP 1: Typ pracy -->
          <div v-if="wStep===1">
            <h2>Co robimy?</h2>
            <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:16px">
              <button class="btn btn-outline" style="flex:1;min-width:140px;padding:20px"
                      :class="{'btn-primary': wForm.order_type==='remont'}"
                      @click="selectType('remont')">
                🔧 Remont / Naprawa
              </button>
              <button class="btn btn-outline" style="flex:1;min-width:140px;padding:20px"
                      :class="{'btn-primary': wForm.order_type==='catalog'}"
                      @click="selectType('catalog')">
                📋 Produkt z katalogu
              </button>
              <button class="btn btn-outline" style="flex:1;min-width:140px;padding:20px"
                      :class="{'btn-primary': wForm.order_type==='nowa_czesc'}"
                      @click="selectType('nowa_czesc')">
                ⚙️ Nowa część / Projekt
              </button>
            </div>
          </div>

          <!-- STEP 2: Szczegóły — dynamiczne wg typu zlecenia -->
          <div v-if="wStep===2">
            <!-- Pola wspólne dla wszystkich typów -->
            <div class="form-row">
              <div class="form-group">
                <label>Klient *</label>
                <input v-model="wForm.client" placeholder="Nazwa firmy / osoby">
              </div>
              <div class="form-group">
                <label>Termin (graniczny) *</label>
                <input type="date" v-model="wForm.deadline">
              </div>
            </div>

            <!-- ══ KATALOG: widok jak sklep internetowy ══ -->
            <div v-if="wForm.order_type==='catalog'">
              <div class="form-group" style="margin-bottom:12px">
                <label>Wybierz produkt z katalogu *</label>
                <select v-model="wForm.template_id" @change="onTemplateChange">
                  <option :value="null" disabled>-- wybierz produkt --</option>
                  <option v-for="t in templates" :key="t.id" :value="t.id">
                    {{ t.name }}
                    {{ t.base_price_pln ? '— ' + t.base_price_pln + ' zł/szt.' : '' }}
                  </option>
                </select>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Ilość (szt.) *</label>
                  <input type="number" v-model.number="wForm.quantity" min="1" placeholder="np. 10">
                </div>
                <!-- Podgląd ceny na żywo -->
                <div class="form-group" style="justify-content:center">
                  <label>Szacowana cena netto</label>
                  <div style="font-size:1.5rem;font-weight:800;color:var(--rcm-blue);padding:6px 0">
                    {{ catalogPrice > 0 ? catalogPrice + ' PLN' : '—' }}
                  </div>
                  <span style="font-size:0.75rem;color:var(--muted)">
                    (cena × ilość × marża)
                  </span>
                </div>
              </div>
              <div class="form-group" style="margin-bottom:12px">
                <label>Uwagi do zamówienia</label>
                <textarea v-model="wForm.notes" placeholder="np. specjalna długość, inna stal..."></textarea>
              </div>
            </div>

            <!-- ══ REMONT / NOWA CZĘŚĆ: widok jak notatnik detektywa ══ -->
            <div v-else>
              <div class="form-group" style="margin-bottom:12px">
                <label>Opis problemu / co klient dokładnie chce? *</label>
                <textarea v-model="wForm.description" rows="4"
                          placeholder="np. Pęknięte ramię koparki, grubość blachy ok. 15mm. Klient chce spawać, nie wymieniać całości."></textarea>
              </div>
              <div class="form-row">
                <div class="form-group">
                  <label>Materiał</label>
                  <input v-model="wForm.material" placeholder="np. S355, Hardox, żeliwo"
                         list="material-suggestions">
                  <datalist id="material-suggestions">
                    <option v-for="m in approvedMaterials" :key="m.id" :value="m.name"></option>
                  </datalist>
                  <span v-if="wForm.material && approvedMaterials.length && !approvedMaterials.some(m=>m.name.toLowerCase()===wForm.material.toLowerCase())"
                        style="font-size:0.75rem;color:#e65100;margin-top:3px;display:block">
                    ⚠️ Nieznany materiał — sprawdź z Dyrektorem przed złożeniem
                  </span>
                </div>
                <div class="form-group">
                  <label>Szacowana wartość (PLN)</label>
                  <input type="number" v-model.number="wForm.estimated_value"
                         min="0" step="100" placeholder="np. 1500">
                  <small class="field-hint">Nie wiesz? Zostaw 0 — technolog wyliczy dokładną cenę.</small>
                </div>
              </div>

              <!-- Checkboxy — kluczowe dla Triage -->
              <div style="display:flex;gap:20px;flex-wrap:wrap;margin:12px 0 16px">
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.9rem">
                  <input type="checkbox" v-model="wForm.has_drawing"
                         style="width:18px;height:18px;cursor:pointer">
                  <span>
                    <strong>Klient dostarczył rysunek</strong>
                    <span style="display:block;font-size:0.78rem;color:var(--muted)">
                      (bez rysunku → Technolog)
                    </span>
                  </span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.9rem">
                  <input type="checkbox" v-model="wForm.requires_visit"
                         style="width:18px;height:18px;cursor:pointer">
                  <span>
                    <strong>Wymaga wizyty u klienta</strong>
                    <span style="display:block;font-size:0.78rem;color:var(--muted)">
                      (pomiary na miejscu)
                    </span>
                  </span>
                </label>
                <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.9rem;
                              margin-top:8px;padding:8px;background:#fff3f3;border-radius:4px;
                              border:1px solid #ffcdd2">
                  <input type="checkbox" v-model="wForm.is_defence"
                         style="width:18px;height:18px;cursor:pointer;accent-color:#c62828">
                  <span>
                    <strong style="color:#c62828">🛡 Projekt zbrojeniowy / MON</strong>
                    <span style="display:block;font-size:0.78rem;color:var(--muted)">
                      Oferty i dokumenty traktowane jako poufne
                    </span>
                  </span>
                </label>
              </div>

              <!-- SOP dla remontu -->
              <div v-if="wForm.order_type==='remont'" class="form-group" style="margin-bottom:12px">
                <label>Rodzaj remontu (opcjonalnie)</label>
                <select v-model="wForm.sop_name">
                  <option value="">-- wybierz jeśli znasz typ pracy --</option>
                  <option v-for="t in templates.filter(t=>t.category==='remont')" :value="t.name">
                    {{ t.name }}
                  </option>
                </select>
              </div>
            </div>

            <div v-if="triageError" style="color:var(--rcm-red);background:#fff0f0;border:1px solid var(--rcm-red);border-radius:6px;padding:10px 14px;margin-top:12px;font-size:.9rem">
              ⚠ {{ triageError }}
            </div>
            <div style="display:flex;gap:8px;margin-top:16px">
              <button class="btn btn-outline" @click="wStep=1;triageError=null">← Wróć</button>
              <button class="btn btn-primary" @click="submitOrderAndTriage"
                      :disabled="triageLoading || !wForm.client || !wForm.deadline || (wForm.order_type==='catalog' && !wForm.template_id)">
                <span v-if="triageLoading">⏳ Wysyłanie...</span>
                <span v-else>Wyślij do Triage →</span>
              </button>
            </div>
          </div>

          <!-- STEP 3: Wynik Triage -->
          <div v-if="wStep===3">
            <h2>Wynik Triage Engine</h2>
            <div v-if="triageResult" :class="'triage-result triage-'+triageResult.branch">
              <span style="font-size:1.5rem">
                {{ triageResult.branch==='odrzut' ? '🚫' : triageResult.branch==='standard' ? '✅' : '⚠️' }}
              </span>
              <div>
                <div style="font-size:0.82rem;text-transform:uppercase;letter-spacing:0.05em">
                  {{ triageResult.branch.toUpperCase() }}
                </div>
                <div style="font-size:0.95rem;font-weight:400;margin-top:4px">
                  {{ triageResult.message }}
                </div>
              </div>
            </div>

            <!-- Ostrzeżenia (action="warn") — wyświetlane zawsze jeśli istnieją -->
            <div v-if="triageResult?.warnings?.length"
                 style="margin-top:12px;padding:12px 16px;background:#fff8e1;border:1px solid var(--rcm-warn);border-radius:var(--radius)">
              <div style="font-weight:700;font-size:0.85rem;color:var(--rcm-warn);margin-bottom:6px">
                ⚠ Ostrzeżenia (nie blokują zlecenia):
              </div>
              <div v-for="w in triageResult.warnings" style="font-size:0.88rem;color:#5d4037">
                • {{ w }}
              </div>
            </div>

            <div v-if="triageResult?.branch==='standard'" style="margin-top:16px">
              <p style="color:var(--muted);font-size:0.88rem">
                Wycena zostanie wygenerowana automatycznie na podstawie szablonu.
              </p>
              <button class="btn btn-success" style="margin-top:8px" @click="tab='orders';loadOrders()">
                Zobacz listę zleceń
              </button>
            </div>
            <div v-if="triageResult?.branch==='niestandard'" style="margin-top:16px">
              <p style="color:var(--muted);font-size:0.88rem;margin-bottom:12px">
                Zlecenie przekazane do kolejki Technologa.
              </p>
              <button class="btn btn-primary" @click="resetWizard">+ Nowe zlecenie</button>
            </div>
            <div v-if="triageResult?.branch==='odrzut'" style="margin-top:16px">
              <button class="btn btn-outline" @click="resetWizard">+ Nowe zlecenie</button>
            </div>
          </div>
        </div>
      </div><!-- /wizard -->

      <!-- ── LISTA ZLECEŃ ─────────────────────────────────────────────── -->
      <div v-if="tab==='orders'">
        <!-- Mini-dashboard dla Biuro -->
        <div v-if="currentUser.role==='biuro'" class="mini-dash">
          <div class="mini-stat">
            <div class="n">{{ orders.filter(o=>['draft','niestandard'].includes(o.status)).length }}</div>
            <div class="t">Nowe / W kolejce</div>
          </div>
          <div class="mini-stat warn">
            <div class="n">{{ orders.filter(o=>o.status==='quoted').length }}</div>
            <div class="t">Do zatwierdzenia</div>
          </div>
          <div class="mini-stat green">
            <div class="n">{{ orders.filter(o=>['in_production','w_trakcie'].includes(o.status)).length }}</div>
            <div class="t">W realizacji</div>
          </div>
          <div class="mini-stat red">
            <div class="n">{{ orders.filter(o=>o.status==='gotowe').length }}</div>
            <div class="t">Gotowe do wydania</div>
          </div>
        </div>
        <div class="card">
          <h2>Lista zleceń</h2>
          <table>
            <thead>
              <tr>
                <th>Nr</th><th>Klient</th><th>Status</th>
                <th>Termin</th><th>Gałąź</th><th>Akcje</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="o in orders" :key="o.id"
                  :style="o.is_defence ? 'border-left:3px solid #c62828' : ''">
                <td>
                  {{ o.order_number || '#'+o.id }}
                  <span v-if="o.is_defence" title="Projekt zbrojeniowy / MON"
                        style="color:#c62828;font-size:0.85rem;margin-left:4px">🛡 MON</span>
                </td>
                <td>{{ o.client }}</td>
                <td><span :class="'badge badge-'+o.status">{{ o.status }}</span></td>
                <td :style="isOverdue(o.deadline) ? 'color:var(--rcm-red);font-weight:700' : ''">
                  {{ o.deadline }}
                </td>
                <td>
                  <span v-if="o.triage_branch"
                    :class="'badge badge-'+o.triage_branch">{{ o.triage_branch }}</span>
                  <span v-else class="badge badge-draft">brak</span>
                </td>
                <td style="display:flex;gap:5px;flex-wrap:wrap">
                  <button class="btn btn-outline btn-sm" @click="openOrder(o)">Szczegóły</button>
                  <!-- Biuro zatwierdza wycenę Technologa → in_production -->
                  <button v-if="o.status==='quoted' && currentUser.role==='biuro'"
                          class="btn btn-success btn-sm" @click="confirmOrder(o)"
                          title="Zatwierdź wycenę Technologa — zlecenie trafi do produkcji">
                    ✅ Zatwierdź
                  </button>
                  <!-- Biuro wydaje gotowe zlecenie klientowi → wydane -->
                  <button v-if="o.status==='gotowe' && currentUser.role==='biuro'"
                          class="btn btn-primary btn-sm" @click="deliverOrder(o)"
                          title="Oznacz jako wydane klientowi — zlecenie zostanie zamknięte">
                    📦 Wydano
                  </button>
                  <a :href="apiBase+'/orders/'+o.id+'/oferta'" target="_blank"
                     class="btn btn-accent btn-sm" style="text-decoration:none"
                     title="PDF dla klienta — z ceną, bez SOP">
                    📄 Oferta
                  </a>
                  <a :href="apiBase+'/orders/'+o.id+'/pdf'" target="_blank"
                     class="btn btn-outline btn-sm" style="text-decoration:none"
                     title="Arkusz produkcyjny — dla ceku, bez cen">
                    🔧 Arkusz
                  </a>
                </td>
              </tr>
              <tr v-if="orders.length===0">
                <td colspan="6" style="text-align:center;color:var(--muted);padding:24px">
                  Brak zleceń
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ── KOLEJKA TECHNOLOGA (Niestandard) ─────────────────────────── -->
      <div v-if="tab==='queue'">
        <!-- Mini-dashboard dla Technologa -->
        <div class="mini-dash">
          <div class="mini-stat warn">
            <div class="n">{{ orders.filter(o=>o.triage_branch==='niestandard'&&o.status==='niestandard').length }}</div>
            <div class="t">Do wyceny</div>
          </div>
          <div class="mini-stat">
            <div class="n">{{ orders.filter(o=>o.status==='in_production').length }}</div>
            <div class="t">Czeka na start</div>
          </div>
          <div class="mini-stat green">
            <div class="n">{{ orders.filter(o=>o.status==='w_trakcie').length }}</div>
            <div class="t">W trakcie pracy</div>
          </div>
          <div class="mini-stat red">
            <div class="n">{{ orders.filter(o=>o.status==='gotowe').length }}</div>
            <div class="t">Gotowe do odbioru</div>
          </div>
        </div>
        <div class="card">
          <h2>Kolejka — Niestandard</h2>
          <table>
            <thead>
              <tr><th>Nr</th><th>Klient</th><th>Termin</th><th>Status</th><th>Pytania Biuro</th><th>Akcje</th><th>📎</th></tr>
            </thead>
            <tbody>
              <template v-for="o in nonstandardOrders" :key="o.id">
                <tr>
                  <td>{{ o.order_number || '#'+o.id }}</td>
                  <td>{{ o.client }}</td>
                  <td :style="isOverdue(o.deadline) ? 'color:var(--rcm-red);font-weight:700' : ''">
                    {{ o.deadline }}
                  </td>
                  <!-- Badge aktualnego statusu zlecenia -->
                  <td><span :class="'badge badge-'+o.status" style="white-space:nowrap">{{ o.status }}</span></td>
                  <td>
                    <!-- Badge: ile pytań czeka na odpowiedź vs ile odpowiedziano -->
                    <span v-if="orderParams[o.id]?.some(p => p.status==='answered')"
                          class="badge badge-done" style="cursor:pointer"
                          @click="toggleParams(o.id)">
                      ✓ {{ orderParams[o.id].filter(p=>p.status==='answered').length }} odpowiedzi
                    </span>
                    <span v-else-if="orderParams[o.id]?.some(p => p.status==='pending')"
                          class="param-badge">⏳ Czeka na dane</span>
                    <span v-else style="color:var(--muted);font-size:0.82rem">—</span>
                  </td>
                  <td style="display:flex;gap:6px;flex-wrap:wrap">
                    <!-- Przyciski zależne od statusu -->
                    <template v-if="['niestandard','quoted'].includes(o.status)">
                      <button class="btn btn-outline btn-sm" @click="toggleParams(o.id)">
                        {{ expandedParams===o.id ? '▲ Ukryj' : '▼ Odpowiedzi' }}
                      </button>
                      <button class="btn btn-accent btn-sm" @click="openZaporModal(o)" title="Wyceń zaporowo (×3-4.5)">Zaporowa</button>
                      <button class="btn btn-primary btn-sm" @click="openQuoteModal(o)" title="Otwórz formularz wyceny">Wycena</button>
                      <button class="btn btn-outline btn-sm" @click="openParamsModal(o)" title="Wyślij pytanie do Biuro">Zapytaj ⭢</button>
                    </template>
                    <!-- Technolog rozpoczyna pracę (po zatwierdzeniu przez Biuro) -->
                    <button v-if="o.status==='in_production'"
                            class="btn btn-success btn-sm" @click="startOrder(o)"
                            title="Rozpocznij pracę nad zleceniem">
                      ▶ Rozpocznij pracę
                    </button>
                    <!-- Technolog kończy pracę → gotowe do odbioru -->
                    <button v-if="o.status==='w_trakcie'"
                            class="btn btn-primary btn-sm" @click="completeOrder(o)"
                            title="Oznacz jako gotowe do odbioru przez klienta">
                      ✅ Gotowe do odbioru
                    </button>
                    <a :href="apiBase+'/orders/'+o.id+'/pdf'" target="_blank"
                       class="btn btn-outline btn-sm" style="text-decoration:none"
                       title="Arkusz produkcyjny (bez cen)">
                      ⬇ PDF
                    </a>
                  </td>
                  <!-- Licznik załączników jako klikalne info -->
                  <td style="text-align:center">
                    <button class="btn btn-outline btn-sm" @click="toggleAttachments(o.id)"
                            :style="(orderAttachments[o.id]||[]).length ? 'color:var(--rcm-accent);border-color:var(--rcm-accent)' : ''"
                            title="Załączniki (rysunki, dokumentacja)">
                      📎 {{ (orderAttachments[o.id]||[]).length || '' }}
                    </button>
                  </td>
                </tr>
                <!-- Rozwijany panel załączników -->
                <tr v-if="expandedAttachments===o.id">
                  <td colspan="7" style="background:#f8f9fa;padding:0">
                    <div style="padding:12px 16px">
                      <div style="font-size:0.82rem;font-weight:600;color:var(--muted);margin-bottom:10px;text-transform:uppercase">
                        Załączniki — {{ o.order_number || '#'+o.id }}
                      </div>
                      <div v-if="!(orderAttachments[o.id]||[]).length"
                           style="color:var(--muted);font-size:0.85rem;margin-bottom:10px">
                        Brak załączników. Dodaj rysunek lub dokumentację:
                      </div>
                      <!-- Lista plików -->
                      <div v-for="a in (orderAttachments[o.id]||[])" :key="a.id"
                           style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)">
                        <a :href="'/'+a.stored_path" target="_blank"
                           style="color:var(--rcm-blue);font-weight:600;font-size:0.88rem">
                          📄 {{ a.filename }}
                        </a>
                        <span style="color:var(--muted);font-size:0.78rem">
                          {{ a.size_bytes ? Math.round(a.size_bytes/1024)+' KB' : '' }}
                          · {{ a.uploaded_by }}
                        </span>
                        <button class="btn btn-sm" style="color:var(--rcm-red);border:1px solid var(--rcm-red);background:none;margin-left:auto"
                                @click="deleteAttachment(a)">×</button>
                      </div>
                      <!-- Upload nowego pliku -->
                      <div style="margin-top:10px">
                        <input type="file" @change="uploadAttachment(o, $event)"
                               style="font-size:0.82rem"
                               accept=".pdf,.dxf,.dwg,.jpg,.jpeg,.png,.xlsx,.docx">
                      </div>
                    </div>
                  </td>
                </tr>
                <!-- Rozwijany panel z pytaniami i odpowiedziami -->
                <tr v-if="expandedParams===o.id">
                  <td colspan="7" style="background:#fafbfc;padding:0">
                    <div style="padding:12px 16px">
                      <div v-if="!orderParams[o.id]?.length"
                           style="color:var(--muted);font-size:0.85rem">
                        Brak pytań dla tego zlecenia.
                      </div>
                      <div v-for="p in orderParams[o.id]" :key="p.id"
                           style="border-left:3px solid var(--border);padding:8px 12px;margin-bottom:8px;border-radius:0 var(--radius) var(--radius) 0"
                           :style="p.status==='answered' ? 'border-left-color:var(--rcm-green)' : 'border-left-color:var(--rcm-warn)'">
                        <div style="font-size:0.78rem;color:var(--muted);margin-bottom:4px">
                          {{ p.asked_at?.slice(0,16).replace('T',' ') }}
                          <span :class="p.status==='answered' ? 'badge badge-done' : 'param-badge'"
                                style="margin-left:6px">
                            {{ p.status==='answered' ? '✓ Odpowiedziano' : '⏳ Oczekuje' }}
                          </span>
                        </div>
                        <div style="font-weight:600;margin-bottom:4px">❓ {{ p.question_text }}</div>
                        <div v-if="p.answer_text"
                             style="background:#e8f5e9;padding:6px 10px;border-radius:var(--radius);font-size:0.88rem">
                          💬 {{ p.answer_text }}
                        </div>
                        <div v-else style="color:var(--muted);font-size:0.82rem;font-style:italic">
                          Biuro jeszcze nie odpowiedziało...
                        </div>
                      </div>
                    </div>
                  </td>
                </tr>
              </template>
              <tr v-if="nonstandardOrders.length===0">
                <td colspan="7" style="text-align:center;color:var(--muted);padding:24px">
                  Brak zleceń w kolejce ✓
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ── KATALOG SOP (Technolog) ───────────────────────────────────── -->
      <div v-if="tab==='templates'">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
            <h2 style="margin-bottom:0">Katalog SOP</h2>
            <button class="btn btn-primary btn-sm" @click="showNewTemplate=true">+ Nowy szablon</button>
          </div>

          <div v-if="showNewTemplate" style="background:var(--bg);padding:16px;border-radius:var(--radius);margin-bottom:16px">
            <h2>Nowy szablon SOP</h2>
            <div class="form-row">
              <div class="form-group">
                <label>Nazwa szablonu</label>
                <input v-model="newTemplate.name" placeholder="np. Wymiana zęba w łyżce">
              </div>
              <div class="form-group">
                <label>Kategoria</label>
                <select v-model="newTemplate.category">
                  <option value="remont">Remont</option>
                  <option value="usługa">Usługa</option>
                  <option value="zbrojenie">Zbrojenie</option>
                  <option value="prefabrykat">Prefabrykat</option>
                </select>
              </div>
              <div class="form-group">
                <label>Cena bazowa (PLN)</label>
                <input type="number" v-model.number="newTemplate.base_price_pln">
              </div>
            </div>

            <!-- Konstruktor bloków SOP -->
            <label style="font-size:0.82rem;font-weight:600;color:var(--muted);text-transform:uppercase">
              Bloki instrukcji (klikaj aby dodać)
            </label>
            <div class="sop-blocks">
              <div class="sop-block" v-for="blk in sopLibrary" @click="addSopBlock(blk)">
                {{ blk }}
              </div>

  // Wykończenie
  "Nałożyć powłokę antykorozyjną",
  "Skompletować elementy wg. listy zbiorczej",
  "Oznaczyć pojemnik numerem zlecenia",
]

// ── Szablonowe pytania do Biuro ──────────────────────────────────────────
const PARAM_QUESTIONS = [
  "Proszę podać markę stali (np. S235, S355, Hardox)",
  "Proszę podać grubość ścianki / blachy (mm)",
  "Proszę potwierdzić wymiary zewnętrzne (dł × szer × wys)",
  "Czy klient dostarczy rysunek / rysunek CAD?",
  "Jaka jest wymagana klasa spawania?",
]

createApp({
  setup() {
    const currentUser = ref(null)
    const loginRole   = ref("biuro")
    const loginPin    = ref("")
    const loginError  = ref(false)
    const tab         = ref("wizard")

    const orders      = ref([])
    const templates   = ref([])
    const analytics   = ref(null)
    const harmonogram = ref([])
    const approvedMaterials = ref([])  // whitelist materiałów
    const triageResult = ref(null)
    const triageError  = ref(null)   // komunikat błędu przy submitcie
    const triageLoading = ref(false) // spinner na przycisku
    const pytania      = ref([])       // pytania Technologa → Biuro
    const answerDraft  = ref({})       // {param_id: "tekst odpowiedzi"}
    const pendingCount = ref(0)        // licznik dla badge w nav
    const orderParams       = ref({})   // {order_id: [ParameterRequest, ...]}
    const expandedParams    = ref(null) // ID zlecenia z otwartym panelem Q&A
    const orderAttachments  = ref({})  // {order_id: [AttachmentOut, ...]}
    const expandedAttachments = ref(null) // ID zlecenia z otwartym panelem załączników
    const settings          = ref({ labor_rate_pln: 90 }) // stawki z /api/settings
    const benchmarkData     = ref(null)  // wynik GET /api/benchmarks/price-per-kg
    const benchmarkFilters  = ref({ material: "", order_type: "" })  // filtry dla benchmark

    // Wizard form
    const wStep = ref(1)
    const wForm = ref({
      client: "", deadline: "", material: "", has_drawing: false,
      order_type: "", sop_name: "", purpose: "", notes: "", estimated_value: 0,
      description: "",       // opis problemu (remont/nowa_czesc)
      requires_visit: false, // wymaga wizyty u klienta
      is_defence: false,     // projekt zbrojeniowy / MON
      template_id: null,     // wybrany produkt z katalogu
      quantity: 1,           // ilość sztuk (katalog)
    })

    // Modals
    const detailsModal = ref({ show:false, order:null, editMode:false, form:{} })
    const quoteModal = ref({
      show:false, order:null, mode:'structured',
      // v3 fields — cleaner formula
      processes:[], // [{name, hours, rate_per_hour, cost}]
      material_weight_kg:0, material_price_per_kg:0,
      material_cost:0,        // legacy fallback
      weight_netto_kg:0, weight_brutto_kg:0,
      labor_hours:0,
      overhead_pct:0.1, margin_pct:0.25,
      transport_cost:0,
      show_unit_prices:true,
      // backward compat
      weight_kg:0, weight_rate_pln_kg:0,
      welding_hours:0,
      savedQuote: null,
    })
    const zaporModal = ref({ show:false, order:null, material_cost:0, hours_estimate:1 })
    const paramsModal = ref({ show:false, order:null, question:"" })

    // Template builder
    const showNewTemplate = ref(false)
    const newTemplate = ref({ name:"", category:"remont", base_price_pln:null, instruction_blocks:[] })

    const sopLibrary    = SOP_LIBRARY
    const paramQuestions = PARAM_QUESTIONS

    // ── Auth ─────────────────────────────────────────────────────────────
    function login() {
      const user = USERS.find(u => u.role === loginRole.value && u.pin === loginPin.value)
      if (user) {
        currentUser.value = user
        loginError.value  = false
        // Otwórz domyślną zakładkę dla roli
        tab.value = { biuro: "wizard", technolog: "queue", dyrektor: "analytics" }[user.role]
        if (tab.value !== "wizard") loadOrders()
        if (tab.value === "analytics") loadAnalytics()
        loadApprovedMaterials()
      } else {
        loginError.value = true
      }
    }
    function logout() { currentUser.value = null; loginPin.value = ""; resetWizard() }

    function resetWizard() {
      wStep.value = 1
      triageResult.value = null
      triageError.value   = null
      triageLoading.value = false
      wForm.value = {
        client: "", deadline: "", material: "", has_drawing: false,
        order_type: "", sop_name: "", purpose: "", notes: "", estimated_value: 0,
        description: "", requires_visit: false, is_defence: false, template_id: null, quantity: 1,
      }
    }

    // Wybór typu w Step 1 — zawsze czyści formularz, żeby dane starego zlecenia
    // nie wyciekały do nowego formularza po "← Wróć"
    function selectType(type) {
      wForm.value = {
        client: "", deadline: "", material: "", has_drawing: false,
        order_type: type, sop_name: "", purpose: "", notes: "", estimated_value: 0,
        description: "", requires_visit: false, is_defence: false, template_id: null, quantity: 1,
      }
      triageError.value = null
      wStep.value = 2
    }

    // ── API helpers ───────────────────────────────────────────────────────
    async function api(path, opts={}) {
      const res = await fetch(API + path, {
        headers: { "Content-Type": "application/json" },
        ...opts,
        body: opts.body ? JSON.stringify(opts.body) : undefined
      })
      if (!res.ok) {
        // Czytaj tekst raz, potem próbuj parsować jako JSON
        const raw = await res.text().catch(() => "")
        let msg = `HTTP ${res.status}`
        try { const e = JSON.parse(raw); msg = e.detail || JSON.stringify(e) }
        catch { msg = raw || msg }
        throw new Error(msg)
      }
      // 204 No Content — brak body, zwróć null
      if (res.status === 204) return null
      return res.json()
    }

    // ── Loader ────────────────────────────────────────────────────────────
    async function loadOrders() {
      const all = await api("/orders")
      orders.value = all.filter(o => o.status !== "cancelled")  // ukryj anulowane
    }

    async function loadApprovedMaterials() {
      approvedMaterials.value = await api("/approved-materials")
    }

    async function deleteOrder(order) {
      if (!confirm(`Usunąć zlecenie #${order.order_number}?\nMożna przywrócić ręcznie z bazy.`)) return
      await api(`/orders/${order.id}`, { method: "DELETE" })
      detailsModal.value.show = false
      await loadOrders()
    }

    async function loadPytania() {
      pytania.value = await api("/params")
      pendingCount.value = pytania.value.filter(p => p.status === "pending").length
    }

    async function submitAnswer(paramId) {
      const text = answerDraft.value[paramId]
      if (!text) return
      await api(`/params/${paramId}/answer`, { method:"PATCH", body:{ answer_text: text } })
      answerDraft.value[paramId] = ""
      await loadPytania()  // odśwież listę i badge
    }
    async function loadTemplates() {
      templates.value = await api("/templates")
    }
    async function loadAnalytics() {
      analytics.value = await api("/analytics")
    }
    async function loadHarmonogram() {
      harmonogram.value = await api("/harmonogram")
    }
    async function loadBenchmark() {
      try {
        const params = new URLSearchParams()
        if (benchmarkFilters.value.material) params.append("material", benchmarkFilters.value.material)
        if (benchmarkFilters.value.order_type) params.append("order_type", benchmarkFilters.value.order_type)
        const qs = params.toString() ? `?${params.toString()}` : ""
        benchmarkData.value = await api(`/benchmarks/price-per-kg${qs}`)
      } catch (e) {
        console.error("Błąd ładowania benchmarku:", e)
        benchmarkData.value = null
      }
    }
    async function loadSettings() {
      // Pobierz stawki z bazy — labor_rate_pln itp.
      const list = await api("/settings")
      const map = {}
      list.forEach(s => { map[s.key] = parseFloat(s.value) || s.value })
      settings.value = { labor_rate_pln: 90, ...map }
    }

    // ── Wizard submit ─────────────────────────────────────────────────────
    async function submitOrderAndTriage() {
      triageError.value   = null
      triageLoading.value = true
      try {
        // 1. Stwórz zlecenie
        const order = await api("/orders", { method:"POST", body: wForm.value })
        // 2. Uruchom Triage Engine
        const result = await api(`/orders/${order.id}/triage`, { method:"POST" })
        triageResult.value = result
        wStep.value = 3
      } catch (e) {
        // Pokaż błąd zamiast cicho tracić klik
        triageError.value = e.message || "Nieznany błąd — sprawdź konsolę"
      } finally {
        triageLoading.value = false
      }
    }

    // ── Oblicz podgląd wyceny (v1 — prosta) ──────────────────────────────
    function calcQuote() {
      const m    = quoteModal.value
      const rate = settings.value.labor_rate_pln || 90
      const sub  = (m.material_cost + m.labor_hours * rate) * (1 + m.overhead_pct)
      return Math.round(sub * (1 + m.margin_pct))
    }

    // ── Oblicz podgląd wyceny (v3 — Gemini formula) ──────────────────────
    function calcQuoteStructured() {
      const m    = quoteModal.value
      const rate = settings.value.labor_rate_pln || 90
      const ops = (m.processes||[]).reduce((s,p) => {
        return s + (p.hours && p.rate_per_hour ? p.hours * p.rate_per_hour : (+p.cost||0))
      }, 0)
      const mat = (+m.material_price_per_kg||0) > 0
        ? (+m.material_weight_kg||0) * (+m.material_price_per_kg||0)
        : (+m.material_cost||0)
      const extra = (+m.labor_hours||0) * rate
      const base  = ops + mat + extra
      return Math.round(base * (1+(+m.overhead_pct||0)) * (1+(+m.margin_pct||0)) + (+m.transport_cost||0))
    }

    // ── Modal handlers ────────────────────────────────────────────────────
    function openOrder(o) {
      detailsModal.value = { show: true, order: o, editMode: false, form: {} }
    }

    function startEdit() {
      const o = detailsModal.value.order
      // Kopiujemy edytowalne pola do formularza edycji
      detailsModal.value.form = {
        client:          o.client,
        deadline:        o.deadline,
        material:        o.material || "",
        description:     o.description || "",
        notes:           o.notes || "",
        estimated_value: o.estimated_value || "",
        has_drawing:     o.has_drawing,
        requires_visit:  o.requires_visit,
      }
      detailsModal.value.editMode = true
    }

    async function saveEdit() {
      const id = detailsModal.value.order.id
      const f  = detailsModal.value.form
      // Wysyłamy tylko pola które mają wartość (puste string → null, puste liczby → pomijamy)
      const payload = {}
      if (f.client)          payload.client          = f.client
      if (f.deadline)        payload.deadline        = f.deadline
      if (f.material)        payload.material        = f.material
      if (f.description)     payload.description     = f.description
      if (f.notes)           payload.notes           = f.notes
      if (f.estimated_value) payload.estimated_value = parseFloat(f.estimated_value)
      payload.has_drawing    = f.has_drawing
      payload.requires_visit = f.requires_visit

      const updated = await api(`/orders/${id}`, { method:"PATCH", body: payload })
      detailsModal.value.order    = updated  // aktualizujemy widok bez przeładowania
      detailsModal.value.editMode = false
      await loadOrders()
    }
    async function openQuoteModal(o) {
      const defaults = {
        show:true, order:o, mode:'structured', savedQuote:null,
        processes:[], material_weight_kg:0, material_price_per_kg:0,
        material_cost:0, weight_netto_kg:0, weight_brutto_kg:0,
        labor_hours:0, overhead_pct:0.1, margin_pct:0.25,
        transport_cost:0, show_unit_prices:true,
        weight_kg:0, weight_rate_pln_kg:0, welding_hours:0,
      }
      // quoted/in_production — załaduj istniejącą wycenę do formularza
      if (['quoted','in_production'].includes(o.status)) {
        try {
          const q = await api(`/orders/${o.id}/quote`)
          quoteModal.value = {
            ...defaults,
            mode: (q.estimate_version === 'v2' || q.estimate_version === 'v3') ? 'structured' : 'simple',
            processes:              Array.isArray(q.processes_json) ? q.processes_json.map(p=>({...p})) : [],
            material_weight_kg:     +(q.material_weight_kg    || 0),
            material_price_per_kg:  +(q.material_price_per_kg || 0),
            material_cost:          +(q.material_cost         || 0),
            weight_netto_kg:        +(q.weight_netto_kg       || 0),
            weight_brutto_kg:       +(q.weight_brutto_kg      || 0),
            labor_hours:            +(q.labor_hours            || 0),
            overhead_pct:           +(q.overhead_pct           || 0.10),
            margin_pct:             +(q.margin_pct             || 0.25),
            transport_cost:         +(q.transport_cost         || 0),
            show_unit_prices:       q.show_unit_prices !== false,
            savedQuote: q,
          }
          return
        } catch(_) { /* brak wyceny — otwórz pusty formularz */ }
      }
      quoteModal.value = defaults
    }
    function openZaporModal(o) {
      zaporModal.value = { show:true, order:o, material_cost:0, hours_estimate:1 }
    }
    function openParamsModal(o) {
      paramsModal.value = { show:true, order:o, question:"" }
    }

    async function submitQuote() {
      const m = quoteModal.value
      let q
      if (m.mode === 'structured') {
        // Wycena strukturalna v2 — formuła technologa
        q = await api(`/orders/${m.order.id}/quote/structured`, {
          method: "POST",
          body: {
            processes:             m.processes,
            material_weight_kg:    m.material_weight_kg   || 0,
            material_price_per_kg: m.material_price_per_kg|| 0,
            material_cost:         m.material_cost        || 0,
            weight_netto_kg:       m.weight_netto_kg      || 0,
            weight_brutto_kg:      m.weight_brutto_kg     || 0,
            labor_hours:           m.labor_hours          || 0,
            overhead_pct:          m.overhead_pct,
            margin_pct:            m.margin_pct,
            transport_cost:        m.transport_cost       || 0,
            show_unit_prices:      m.show_unit_prices,
          }
        })
      } else {
        // Wycena prosta v1
        q = await api(`/orders/${m.order.id}/quote`, {
          method: "POST",
          body: {
            labor_hours: m.labor_hours, material_cost: m.material_cost,
            overhead_pct: m.overhead_pct, margin_pct: m.margin_pct
          }
        })
      }
      quoteModal.value.savedQuote = q    // pokaż panel "Zapisz jako szablon"
      await loadOrders()                  // odśwież status w liście
    }

    async function confirmOrder(o) {
      if (!confirm(`Zatwierdzić wycenę dla ${o.client}?\nZlecenie trafi do produkcji.`)) return
      await api(`/orders/${o.id}/confirm`, { method:"POST" })
      await loadOrders()
    }

    async function startOrder(o) {
      if (!confirm(`Rozpocząć pracę nad zleceniem ${o.order_number} (${o.client})?`)) return
      await api(`/orders/${o.id}/start`, { method:"POST" })
      await loadOrders()
    }

    async function completeOrder(o) {
      if (!confirm(`Oznaczyć zlecenie ${o.order_number} jako gotowe do odbioru?`)) return
      await api(`/orders/${o.id}/complete`, { method:"POST" })
      await loadOrders()
    }

    async function deliverOrder(o) {
      if (!confirm(`Potwierdzić wydanie zlecenia ${o.order_number} klientowi ${o.client}?\nZlecenie zostanie zamknięte.`)) return
      await api(`/orders/${o.id}/deliver`, { method:"POST" })
      await loadOrders()
    }

    async function saveAsTemplate(order) {
      const name = prompt("Nazwa szablonu SOP:", `${order.sop_name || order.client} — ${order.order_type || 'remont'}`)
      if (!name) return
      await api(`/orders/${order.id}/save-as-template`, {
        method: "POST",
        body: { name, category: order.order_type || "remont" }
      })
      await loadTemplates()
      alert("✅ Szablon SOP zapisany! Pojawi się w Katalogu Standard.")
    }

    async function submitZapor() {
      const m = zaporModal.value
      const q = await api(`/orders/${m.order.id}/quote/zapor`, {
        method: "POST",
        body: { material_cost: m.material_cost, hours_estimate: m.hours_estimate }
      })
      zaporModal.value.show = false
      await loadOrders()
      alert(`⚡ Zaporowa cena: ${q.total_net} PLN`)
    }

    // ── Załączniki ────────────────────────────────────────────────────────
    async function toggleAttachments(orderId) {
      if (expandedAttachments.value === orderId) {
        expandedAttachments.value = null
        return
      }
      orderAttachments.value[orderId] = await api(`/orders/${orderId}/attachments`)
      expandedAttachments.value = orderId
    }
    async function uploadAttachment(order, event) {
      const file = event.target.files[0]
      if (!file) return
      const fd = new FormData()
      fd.append("file", file)
      fd.append("uploaded_by", currentUser.value?.role || "technolog")
      const res = await fetch(`${API}/orders/${order.id}/attachments`, { method:"POST", body: fd })
      if (!res.ok) { alert("Błąd uploadu pliku"); return }
      // Odśwież listę załączników
      orderAttachments.value[order.id] = await api(`/orders/${order.id}/attachments`)
      event.target.value = ""  // wyczyść input
    }
    async function deleteAttachment(att) {
      if (!confirm(`Usunąć plik "${att.filename}"?`)) return
      await api(`/attachments/${att.id}`, { method:"DELETE" })
      orderAttachments.value[att.order_id] = await api(`/orders/${att.order_id}/attachments`)
    }

    async function submitParamRequest() {
      const m = paramsModal.value
      await api(`/orders/${m.order.id}/params`, {
        method: "POST",
        body: { question_text: m.question }
      })
      paramsModal.value.show = false
      // Odśwież panel odpowiedzi dla tego zlecenia
      await toggleParams(m.order.id)
      alert("✅ Pytanie wysłane do Biuro!")
    }

    async function toggleParams(orderId) {
      if (expandedParams.value === orderId) {
        expandedParams.value = null  // zwiń jeśli już otwarty
        return
      }
      // Pobierz pytania dla tego zlecenia z API
      orderParams.value[orderId] = await api(`/orders/${orderId}/params`)
      expandedParams.value = orderId
    }

    // ── Template builder ──────────────────────────────────────────────────
    function addSopBlock(text) {
      const blks = newTemplate.value.instruction_blocks
      blks.push({ order: blks.length + 1, text })
    }
    function removeSopBlock(i) {
      newTemplate.value.instruction_blocks.splice(i, 1)
    }
    async function saveTemplate() {
      await api("/templates", { method:"POST", body: newTemplate.value })
      showNewTemplate.value = false
      newTemplate.value = { name:"", category:"remont", base_price_pln:null, instruction_blocks:[] }
      loadTemplates()
    }

    // ── Computed ──────────────────────────────────────────────────────────
    // Kolejka Technologa — wszystkie aktywne niestandard + zlecenia w trakcie realizacji
    const nonstandardOrders = computed(() =>
      orders.value.filter(o =>
        o.triage_branch === "niestandard" &&
        !["rejected", "cancelled", "done", "wydane"].includes(o.status)
      )
    )

    // Podgląd ceny katalogu na żywo: cena_bazowa × ilość × (1 + marża)
    const catalogPrice = computed(() => {
      if (!wForm.value.template_id || !wForm.value.quantity) return 0
      const tmpl = templates.value.find(t => t.id === wForm.value.template_id)
      if (!tmpl || !tmpl.base_price_pln) return 0
      return Math.round(tmpl.base_price_pln * wForm.value.quantity * (1 + tmpl.margin_pct))
    })

    // Po wyborze szablonu — zaktualizuj estimated_value dla reguły Triage (min. marży)
    function onTemplateChange() {
      wForm.value.estimated_value = catalogPrice.value
    }

    // ── Utils ─────────────────────────────────────────────────────────────
    function isOverdue(deadline) {
      return deadline && deadline < new Date().toISOString().slice(0,10)
    }

    // Załaduj szablony i ustawienia przy starcie + licznik pytań dla Biuro
    onMounted(async () => {
      await Promise.all([loadTemplates(), loadSettings()])
      // Odśwież badge co 30s (prosty polling zamiast WebSocket dla MVP)
      loadPytania()
      setInterval(loadPytania, 30000)
    })

    return {
      apiBase: API,
      currentUser, loginRole, loginPin, loginError,
      tab, orders, templates, analytics, harmonogram, triageResult, triageError, triageLoading,
      wStep, wForm,
      detailsModal, quoteModal, zaporModal, paramsModal,
      showNewTemplate, newTemplate,
      sopLibrary, paramQuestions,
      settings,
      approvedMaterials, loadApprovedMaterials,
      benchmarkData, benchmarkFilters, loadBenchmark,
      nonstandardOrders, catalogPrice, onTemplateChange,
      login, logout, resetWizard, selectType,
      pytania, answerDraft, pendingCount, orderParams, expandedParams,
      orderAttachments, expandedAttachments,
      loadOrders, loadTemplates, loadAnalytics, loadHarmonogram, loadPytania, submitAnswer,
      toggleParams, toggleAttachments, uploadAttachment, deleteAttachment,
      submitOrderAndTriage, calcQuote, calcQuoteStructured,
      openOrder, deleteOrder, startEdit, saveEdit, openQuoteModal, openZaporModal, openParamsModal,
      submitQuote, submitZapor, submitParamRequest,
      confirmOrder, startOrder, completeOrder, deliverOrder, saveAsTemplate,
      addSopBlock, removeSopBlock, saveTemplate,
      isOverdue,
    }
  }
}).mount("#app")
</script>
</body>
</html>

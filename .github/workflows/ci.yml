name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn sqlalchemy pydantic python-multipart \
                      openpyxl jinja2 httpx pytest

      - name: Run tests
        run: pytest tests/ -v
        working-directory: .
